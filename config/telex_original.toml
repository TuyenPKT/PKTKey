name = "Telex"
double_press_escape = true
aw_requires_consonant = false
protected_words = []

# 'w' là ký tự thay thế standalone → ư
# Ví dụ: w → ư, nw → nư (UniKey-compatible)
[char_sub]
"w" = "ư"

# Ghép đôi ký tự → nguyên âm / phụ âm đặc biệt
[double_char]
"dd" = "đ"
"aa" = "â"
"ee" = "ê"
"oo" = "ô"
"aw" = "ă"
"ow" = "ơ"
"uw" = "ư"

# Phím thanh điệu
[tone]
"s" = "sac"     # sắc  ◌́
"f" = "huyen"   # huyền ◌̀
"r" = "hoi"     # hỏi  ◌̉
"x" = "nga"     # ngã  ◌̃
"j" = "nang"    # nặng ◌̣

[vowel_mod]
