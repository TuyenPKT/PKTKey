<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PKTKey — Bộ gõ Tiếng Việt</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 640px;
      margin-bottom: 1rem;
    }

    .card h2 {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 0.75rem;
    }

    /* Mode bar */
    .mode-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .mode-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.15s, color 0.15s;
    }

    .mode-badge.vi { background: #0f766e; color: #ccfbf1; }
    .mode-badge.en { background: #334155; color: #94a3b8; }

    .mode-hint { font-size: 0.78rem; color: #64748b; }

    /* Preset selector */
    .preset-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .preset-btn {
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      border: 1px solid #334155;
      background: transparent;
      color: #94a3b8;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .preset-btn.active, .preset-btn:hover {
      background: #1d4ed8;
      color: #fff;
      border-color: #1d4ed8;
    }

    /* Textarea */
    #input-area {
      width: 100%;
      min-height: 160px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1rem;
      font-size: 1.15rem;
      color: #f1f5f9;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.7;
    }

    #input-area:focus { border-color: #3b82f6; }

    /* Live candidate overlay */
    .candidate-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.75rem;
      min-height: 1.6rem;
    }

    .candidate-label { font-size: 0.78rem; color: #64748b; }

    #candidate-text {
      font-size: 1rem;
      color: #38bdf8;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* Log */
    #log {
      font-size: 0.8rem;
      color: #64748b;
      max-height: 140px;
      overflow-y: auto;
      font-family: ui-monospace, monospace;
    }

    #log div { padding: 0.15rem 0; border-bottom: 1px solid #1e293b; }
    #log .replace { color: #4ade80; }
    #log .pass    { color: #facc15; }
    #log .commit  { color: #f472b6; }

    /* Keyboard reference */
    .ref-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 0.4rem;
    }

    .ref-item {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
      font-size: 0.8rem;
    }

    .ref-key {
      display: inline-block;
      background: #334155;
      color: #e2e8f0;
      padding: 0.05rem 0.35rem;
      border-radius: 3px;
      font-family: monospace;
      font-size: 0.75rem;
      margin-right: 4px;
    }

    .ref-arrow { color: #475569; margin: 0 2px; }
    .ref-result { color: #38bdf8; }

    .tip {
      margin-top: 0.6rem;
      font-size: 0.75rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <h1>PKTKey</h1>
  <p class="subtitle">Bộ gõ Tiếng Việt thông minh · Smart Vietnamese IME</p>

  <div class="card">
    <h2>Chế độ nhập</h2>
    <div class="mode-bar">
      <span class="mode-badge vi" id="mode-badge">🇻🇳 Tiếng Việt</span>
      <span class="mode-hint">Nhấn <kbd>Ctrl+Space</kbd> để chuyển ngôn ngữ</span>
    </div>
    <div class="preset-row">
      <button class="preset-btn active" data-preset="telex">Telex</button>
      <button class="preset-btn" data-preset="vni">VNI</button>
    </div>

    <textarea id="input-area" placeholder="Gõ tiếng Việt vào đây…&#10;Type Vietnamese here…&#10;&#10;Thử: chao, xin, viet, nam&#10;False-positive guard: watch, show, how"></textarea>

    <div class="candidate-row">
      <span class="candidate-label">Âm tiết đang gõ:</span>
      <span id="candidate-text">—</span>
    </div>
  </div>

  <div class="card">
    <h2>Engine log</h2>
    <div id="log"></div>
  </div>

  <div class="card">
    <h2>Bảng phím Telex</h2>
    <div class="ref-grid" id="ref-grid"></div>
    <p class="tip">Gõ đôi để huỷ: <kbd>ww</kbd> → w &nbsp;|&nbsp; Ctrl+Space: chuyển Vi/En</p>
  </div>

  <script type="module">
    import init, { WasmEngine } from './pkg/pktkey_wasm.js';

    const TELEX_REF = [
      ['w',  'ư'], ['ow', 'ơ'], ['uw', 'ư'], ['aw', 'ă'],
      ['aa', 'â'], ['ee', 'ê'], ['oo', 'ô'], ['dd', 'đ'],
      ['s',  'sắc ◌́'], ['f', 'huyền ◌̀'], ['r', 'hỏi ◌̉'],
      ['x',  'ngã ◌̃'], ['j', 'nặng ◌̣'],
    ];

    const VNI_REF = [
      ['a6', 'â'], ['a8', 'ă'], ['e6', 'ê'], ['o6', 'ô'],
      ['o7', 'ơ'], ['u7', 'ư'], ['d9', 'đ'],
      ['1',  'sắc ◌́'], ['2', 'huyền ◌̀'], ['3', 'hỏi ◌̉'],
      ['4',  'ngã ◌̃'],  ['5', 'nặng ◌̣'],
    ];

    let engine = null;
    let currentPreset = 'telex';
    // Track candidate separately since WASM engine owns the buffer state
    let candidate = '';

    async function setup() {
      await init();
      engine = new WasmEngine('telex');
      renderRef(TELEX_REF);

      document.getElementById('input-area').addEventListener('keydown', onKeyDown);

      document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentPreset = btn.dataset.preset;
          engine = new WasmEngine(currentPreset);
          candidate = '';
          document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('ref-grid').innerHTML = '';
          renderRef(currentPreset === 'vni' ? VNI_REF : TELEX_REF);
          syncMode();
          log(`Switched to ${currentPreset.toUpperCase()}`, 'pass');
        });
      });
    }

    function onKeyDown(e) {
      // Ctrl+Space: toggle mode
      if (e.code === 'Space' && e.ctrlKey) {
        e.preventDefault();
        engine.toggleMode();
        candidate = '';
        syncMode();
        setCandidateDisplay('—');
        return;
      }

      // Let browser handle control keys
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      if (e.key.length !== 1) return; // non-printable (arrow keys etc.)

      e.preventDefault();

      const key = e.key;
      const result = engine.processKey(key);

      if (result === null) return;

      const ta = document.getElementById('input-area');

      if (result.type === 'Passthrough') {
        // Commit any pending candidate first
        if (candidate) {
          replaceCandidate(ta, candidate, candidate);
          candidate = '';
        }
        insertAt(ta, key);
        log(`Passthrough: '${key}'`, 'pass');
        setCandidateDisplay('—');

      } else if (result.type === 'Replace') {
        const { delete_back, text } = result;
        replaceCandidate(ta, candidate, text);
        candidate = text;
        log(`Replace -${delete_back} +"${text}"`, 'replace');
        // Don't show space/delimiter as candidate
        const display = text.trimEnd();
        if (display === '') {
          setCandidateDisplay('—');
          candidate = '';
        } else {
          setCandidateDisplay(display);
          // If last char is a delimiter the syllable was committed
          if (isDelimiter(text[text.length - 1])) {
            candidate = '';
            setCandidateDisplay('—');
          }
        }

      } else if (result.type === 'Commit') {
        replaceCandidate(ta, candidate, result.text);
        candidate = '';
        log(`Commit: "${result.text}"`, 'commit');
        setCandidateDisplay('—');
      }
    }

    function replaceCandidate(ta, oldCandidate, newText) {
      const start = ta.selectionStart;
      const end   = ta.selectionEnd;
      const val   = ta.value;

      // Delete the old candidate chars before cursor
      const deleteCount = [...oldCandidate].length; // char count, not byte count
      const delStart = start - deleteCount;
      const before = val.slice(0, Math.max(0, delStart));
      const after  = val.slice(start);
      ta.value = before + newText + after;
      const newPos = before.length + newText.length;
      ta.setSelectionRange(newPos, newPos);
    }

    function insertAt(ta, text) {
      const start = ta.selectionStart;
      const val   = ta.value;
      ta.value = val.slice(0, start) + text + val.slice(start);
      const pos = start + text.length;
      ta.setSelectionRange(pos, pos);
    }

    function isDelimiter(ch) {
      return ' \n\r\t.,!?;:'.includes(ch);
    }

    function syncMode() {
      const mode = engine.getMode();
      const badge = document.getElementById('mode-badge');
      if (mode === 'vi') {
        badge.textContent = '🇻🇳 Tiếng Việt';
        badge.className = 'mode-badge vi';
      } else {
        badge.textContent = '🇺🇸 English';
        badge.className = 'mode-badge en';
      }
    }

    function setCandidateDisplay(text) {
      document.getElementById('candidate-text').textContent = text;
    }

    function log(msg, cls = '') {
      const el = document.getElementById('log');
      const div = document.createElement('div');
      div.className = cls;
      div.textContent = `${new Date().toLocaleTimeString('vi-VN')} ${msg}`;
      el.prepend(div);
      if (el.children.length > 50) el.lastChild.remove();
    }

    function renderRef(pairs) {
      const grid = document.getElementById('ref-grid');
      for (const [key, result] of pairs) {
        const item = document.createElement('div');
        item.className = 'ref-item';
        item.innerHTML = `<span class="ref-key">${key}</span><span class="ref-arrow">→</span> <span class="ref-result">${result}</span>`;
        grid.appendChild(item);
      }
    }

    setup().catch(err => {
      document.body.innerHTML = `<pre style="color:red;padding:2rem">${err}</pre>`;
    });
  </script>
</body>
</html>
